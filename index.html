<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notif.test</title>
    <style>
        #t {
            width: 520px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: block;
        }
        #b {
            resize: none;
            width: 520px;
            height: 360px;
            margin-top: 2px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: block;
        }
        #n {
            display: block;
        }
        h1 {
            font-family:Verdana, Geneva, Tahoma, sans-serif;
        }
        #f {
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <button onclick="permission()">Request permission</button>
    <h1>This is a notifications test. Please remember to request permission before doing any of the below.</h1>
    <input type="file" id="f" accept="image/*">
    <input id="t" placeholder="Enter your notification title"></input>
    <textarea id="b" placeholder="Enter your notification body."></textarea>
    <button onclick="notify()" id="n" disabled>Notify me</button>
    <script>
        async function permission() {
            var hi = await Notification.requestPermission();
            if (hi != 'granted') return;
            else {
                document.getElementById("n").disabled = false;
            }
        }
        function notify() {
            const t = document.getElementById("t").value;
            const b = document.getElementById("b").value;
            const f = document.getElementById("f").files[0];
            
            if (f) {
                if (!f.type.startsWith('image/')) {
                    alert('Please select an image file.');
                    return;
                } else {
                    let icon = URL.createObjectURL(f);
                    new Notification(t, {
                        body: b,
                        icon: icon
                    });
                    URL.revokeObjectURL(f);
                }
            } else {
                new Notification(t, {
                    body: b
                });
            }
        }
    </script>
</body>
</html>
